spring.application.name=OAUTH-SERVER
server.port=8090


#LOGGING
logging.level.root=INFO

#appender consola
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%highlight(%-5level)] [%cyan(%thread)][%X{traceId:-}-%X{spanId:-}] %magenta(%logger{15}) -%msg%n

eureka.client.service-url.defaultZone=${EUREKA_URL}
config-base-url.endpoint-gateway=${GATEWAY_URL}

spring.datasource.url=${OAUTH_DB_URL}
spring.datasource.username=${OAUTH_DB_USER}
spring.datasource.password=${OAUTH_DB_PASSWORD}
spring.datasource.driver-class-name=${OAUTH_DB_DRIVER}
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:oauth-schema-postgresql.sql,classpath:oauth-extra-schema.sql
