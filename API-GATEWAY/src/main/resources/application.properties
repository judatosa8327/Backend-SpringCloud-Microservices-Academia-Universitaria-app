spring.application.name=API-GATEWAY
server.port=8080
#LOGGING
logging.level.root=INFO
#appender consola
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%highlight(%-5level)] [%cyan(%thread)][%X{traceId:-}-%X{spanId:-}] %magenta(%logger{15}) -%msg%n
eureka.client.service-url.defaultZone=${EUREKA_URL}
spring.cloud.gateway.mvc.routes[0].id=MSVC-USERS
spring.cloud.gateway.mvc.routes[0].uri=lb://MSVC-USERS
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/v1/users/**,/login
spring.cloud.gateway.mvc.routes[1].id=MSVC-COURSES
spring.cloud.gateway.mvc.routes[1].uri=lb://MSVC-COURSES
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/v1/cursos/**
